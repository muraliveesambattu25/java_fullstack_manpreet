<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            align-items: baseline;
            border: 2px solid black;
        }

        .box {
            padding: 10px;
            border: 1px solid blue;
        }

        .small {
            font-size: 12px;
        }

        .medium {
            font-size: 20px;
        }

        .large {
            font-size: 32px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box small">Small</div>
        <div class="box large">Large Text</div>
        <div class="box medium">Medium</div>
    </div>
</body>

</html>
