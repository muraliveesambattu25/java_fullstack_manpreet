<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      main {
        width: 960px;
        border: 2px solid red;
        height: 1000px;
        margin: 0 auto;
      }
      header,
      section,
      footer {
        width: 900px;
        margin: 20px auto;
        border: 2px solid blue;
      }
      header,
      footer {
        height: 150px;
      }
      ul {
        list-style: none;
      }
      li {
        width: 140px;
        background: gray;
        margin: 2px;
        color: white;
        padding: 10px;
        float: left;
        text-align: center;
      }
      section {
        height: 600px;
      }
      article {
        width: 425px;
        height: 400px;
        border: 2px solid green;
        margin: 10px;
        float: left;
      }
      article#bottomarticle {
        width: 873px;
        height: 150px;
      }
    </style>
  </head>
  <body>
    <!-- <div id="main"></div> -->
    <main>
      <header>
        <nav>
          <ul>
            <li>Home</li>
            <li>Contact</li>
            <li>Gallery</li>
            <li>Projects</li>
            <li>About Us</li>
          </ul>
        </nav>
      </header>

      <section>
        <article>
          <audio controls>
            <source src="./mixkit-dog-barking-twice-1.wav" type="audio/mpeg" />
          </audio>
          <audio controls>
            <source
              src="./mixkit-fast-rocket-whoosh-1714.wav"
              type="audio/mpeg"
            />
          </audio>
        </article>
        <article>
          <video controls width="100%" height="50%">
            <source src="./15150488_3840_2160_25fps.mp4" type="video/mp4" />           
          </video>
           <video controls width="100%" height="50%">
            <source src="./15604872_1920_1080_24fps.mp4" type="video/mp4" />           
          </video>
        </article>
        <article id="bottomarticle"></article>
      </section>
      <footer></footer>
    </main>
  </body>
</html>
