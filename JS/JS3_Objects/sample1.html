<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // {}  An Empty Object 
        // var sayHello = function (){} ;

        // Type 1 : Literal way creating Objects 
        var person = {};
        console.log(person);

        // Type 2 : Built in Method 
        var person2 = new Object();
        console.log(person2);

        // Constructor Function - ES5
        function Student (){}

        var person3 = new Student();        
        console.log(person3);

        // ES6 way of Creating Objects 
        class Person {}
        var person4 = new Person();
        console.log(person4);

    </script>
</body>

</html>
