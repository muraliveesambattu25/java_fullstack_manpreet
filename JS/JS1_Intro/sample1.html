<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function changeHeading() {
            document.querySelector("h2").style.color = "red"
        }
    </script>
</head>

<body>
    <button onclick="changeHeading()">Change Color</button>
    <h2>Hello World </h2>
</body>

</html>
